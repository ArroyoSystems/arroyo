[package]
name = "arroyo-server-common"
version = "0.16.0-dev"
edition = "2024"

[dependencies]
arroyo-types = { path = "../arroyo-types" }
arroyo-rpc = { path = "../arroyo-rpc" }

jemalloc_pprof = "0.7.0"

# logging
json-subscriber = "0.2.6"
tracing = { workspace = true }
tracing-logfmt = "0.2.0"
tracing-subscriber = { workspace = true }
tracing-appender = "0.2"
tracing-log = "0.2"

# middleware
tower = { workspace = true }
tower-http = {workspace = true, features = ["trace", "fs", "validate-request", "auth"]}
tonic = { workspace = true }
tokio = { workspace = true }
prometheus = {workspace = true, features = ["process"] }
axum = {workspace = true}
axum-server = { version = "0.7", features = ["tls-rustls"] }
http = { workspace = true }

lazy_static = { workspace = true }
futures = { workspace = true }
once_cell = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde_json = { workspace = true }
tokio-util = "0.7.10"
anyhow = { workspace = true }
toml = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }
url = { workspace = true }
rustls = { workspace = true, features = ["std", "aws_lc_rs"] }
rustls-pemfile = { workspace = true }
rustls-native-certs = "0.8"
tokio-postgres = { version = "*", features = ["runtime"] }
tokio-postgres-rustls = "0.13"
webpki-roots = { workspace = true }

# profile
flate2 = { workspace = true }
pprof = { version = "0.15.0", features = ["flamegraph", "protobuf-codec"] }
serde = { workspace = true }

[build-dependencies]
vergen = { version = "8.0.0", features = ["build", "cargo", "git", "gitcl"] }

