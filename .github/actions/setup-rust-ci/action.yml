name: Setup Rust CI
description: Prepare the runner for Rust workspace CI jobs

inputs:
  build-console:
    description: Build the web console assets needed by arroyo-api builds
    default: "true"
  setup-postgres:
    description: Install and start Postgres, then run Rust workspace migrations
    default: "true"
  install-kafka:
    description: Install and start the local Kafka broker used by tests
    default: "true"
  install-mosquitto:
    description: Install and start the local Mosquitto broker used by tests
    default: "true"
  install-netcat:
    description: Install netcat for readiness checks
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        components: clippy, rustfmt
        toolchain: 1.93

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Setup pnpm
      if: ${{ inputs.build-console == 'true' }}
      uses: pnpm/action-setup@v4
      with:
        version: 9.0.6
        run_install: |
          - recursive: true
            args: [--frozen-lockfile, --strict-peer-dependencies]

    - name: Build console
      if: ${{ inputs.build-console == 'true' }}
      shell: bash
      run: |
        cd webui
        pnpm build

    - name: Install dependencies based on inputs
      shell: bash
      run: |
        sudo apt-get update
        packages=(cmake clang protobuf-compiler libsasl2-dev)
        if [ "${{ inputs.setup-postgres }}" = "true" ]; then
          packages+=(postgresql)
        fi
        if [ "${{ inputs.install-mosquitto }}" = "true" ]; then
          packages+=(mosquitto)
        fi
        if [ "${{ inputs.install-netcat }}" = "true" ]; then
          packages+=(netcat-openbsd)
        fi
        sudo apt-get install -y "${packages[@]}"

    - name: Install cargo-nextest
      shell: bash
      run: |
        curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

    - name: Setup Postgres
      if: ${{ inputs.setup-postgres == 'true' }}
      shell: bash
      run: |
        sudo systemctl start postgresql
        sudo -u postgres psql -c "CREATE USER arroyo WITH PASSWORD 'arroyo' SUPERUSER;"
        sudo -u postgres createdb arroyo
        if ! cargo install --list | grep -q '^refinery_cli v0\.8\.14:'; then
          cargo install refinery_cli --version 0.8.14 --force
        fi
        ~/.cargo/bin/refinery migrate -e DATABASE_URL -p crates/arroyo-api/migrations

    - name: Install Kafka
      if: ${{ inputs.install-kafka == 'true' }}
      shell: bash
      run: |
        wget --progress=dot --show-progress https://dlcdn.apache.org/kafka/3.9.2/kafka_2.13-3.9.2.tgz
        tar xvfz kafka*.tgz
        mkdir -p /tmp/kraft-combined-logs
        kafka_*/bin/kafka-storage.sh format -t 9v5PspiySuWU2l5NjTgRuA -c kafka_*/config/kraft/server.properties
        kafka_*/bin/kafka-server-start.sh -daemon kafka_*/config/kraft/server.properties

    - name: Install mosquitto
      if: ${{ inputs.install-mosquitto == 'true' }}
      shell: bash
      run: |
        sudo service mosquitto start
