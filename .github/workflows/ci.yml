name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      webui: ${{ steps.filter.outputs.webui }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            webui:
              - 'webui/**'
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  lint-console:
    needs: changes
    if: needs.changes.outputs.webui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]
      - name: Run prettier
        run: |
          cd webui
          pnpm check

  rust-components:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
      - name: Determine Rust components
        id: packages
        run: |
          packages=$(python3 <<'PY'
          import json
          import subprocess
          from functools import lru_cache

          data = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          workspace_packages = {pkg["name"]: pkg for pkg in data["packages"]}
          packages = sorted(
              pkg["name"]
              for pkg in workspace_packages.values()
              if pkg["name"] != "integ"
          )
          dependency_graph = {
              name: sorted(
                  dep["name"]
                  for dep in pkg["dependencies"]
                  if dep["name"] in workspace_packages
              )
              for name, pkg in workspace_packages.items()
          }

          @lru_cache(maxsize=None)
          def get_cached_dependency_closure(name):
              return transitive_workspace_dependencies(name, ())

          def transitive_workspace_dependencies(name, path):
              if name in path:
                  cycle = " -> ".join((*path, name))
                  raise ValueError(f"Cycle detected in workspace dependency graph: {cycle}")

              deps = {name}
              next_path = (*path, name)
              for dep in dependency_graph.get(name, []):
                  deps.update(transitive_workspace_dependencies(dep, next_path))
              return frozenset(deps)

          def depends_on_any_target(package_names, targets):
              return any(
                  get_cached_dependency_closure(package_name) & targets
                  for package_name in package_names
              )

          def package_entry(name, package_names):
              package_set = set(package_names)
              return {
                  "name": name,
                  "package_args": " ".join(f"--package {pkg}" for pkg in package_names),
                  "build_console": depends_on_any_target(package_names, {"arroyo-api"}),
                  "setup_postgres": depends_on_any_target(
                      package_names,
                      {"arroyo-api", "arroyo-controller"},
                  ),
                  "install_kafka": "arroyo-connectors" in package_set,
                  "install_mosquitto": "arroyo-connectors" in package_set,
              }

          bundled_packages = [
              ("fast-foundation", [
                  "arroyo-metrics",
                  "arroyo-types",
                  "arroyo-udf-common",
                  "arroyo-udf-macros",
              ]),
              ("fast-runtime", [
                  "arroyo-compiler-service",
                  "arroyo-rpc",
                  "arroyo-state",
                  "arroyo-storage",
                  "arroyo-udf-host",
              ]),
          ]
          grouped = []
          assigned = set()
          for name, group_packages in bundled_packages:
              present = [pkg for pkg in group_packages if pkg in packages]
              if not present:
                  continue
              grouped.append(package_entry(name, present))
              assigned.update(present)
          grouped.extend(
              package_entry(pkg, [pkg])
              for pkg in packages
              if pkg not in assigned
          )
          print(json.dumps(grouped))
          PY
          )
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  rust-format:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: 1.93
      - name: Check Formatting
        run: cargo fmt -- --check

  build-rust:
    needs: rust-components
    name: build-rust (${{ matrix.package.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.rust-components.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        with:
          build-console: ${{ matrix.package.build_console }}
          setup-postgres: ${{ matrix.package.setup_postgres }}
          install-kafka: ${{ matrix.package.install_kafka }}
          install-mosquitto: ${{ matrix.package.install_mosquitto }}
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Run Clippy
        run: cargo clippy --all-targets ${{ matrix.package.package_args }} -- -D warnings
      - name: Run lib tests
        run: cargo nextest run ${{ matrix.package.package_args }} -E 'kind(lib)' --no-tests=pass

  integ-postgres:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-22.04
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        with:
          build-console: true
          setup-postgres: true
          install-kafka: true
          install-mosquitto: false
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build Arroyo
        run: cargo build --package arroyo
      - name: Integ postgres
        run: |
          killall arroyo || true
          mkdir -p /tmp/arroyo-integ
          ARROYO__DISABLE_TELEMETRY=true ARROYO__CHECKPOINT_URL=file:///tmp/arroyo-integ ARROYO__COMPILER__ARTIFACT_URL=file:///tmp/artifacts target/debug/arroyo cluster &
          cargo nextest run --package integ -E 'kind(test)'

  integ-sqlite:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-22.04
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        with:
          build-console: true
          setup-postgres: true
          install-kafka: true
          install-mosquitto: false
          install-netcat: true
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build Arroyo
        run: cargo build --package arroyo
      - name: Integ sqlite
        run: |
          killall arroyo || true
          mkdir -p /tmp/arroyo-integ
          ARROYO__DISABLE_TELEMETRY=true ARROYO__CHECKPOINT_URL=file:///tmp/arroyo-integ ARROYO__COMPILER__ARTIFACT_URL=file:///tmp/artifacts ARROYO__DATABASE__TYPE=sqlite target/debug/arroyo cluster &
          timeout=10; while ! nc -z localhost 5115 && [ $timeout -gt 0 ]; do sleep 1; timeout=$((timeout - 1)); done; [ $timeout -gt 0 ]
          cargo nextest run --package integ -E 'kind(test)'

  build-console:
    needs: changes
    if: needs.changes.outputs.webui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]
      - name: Build console
        run: |
          cd webui
          pnpm build
