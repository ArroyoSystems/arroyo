name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-console:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]
      - name: Run prettier
        run: |
          cd webui
          pnpm check

  rust-components:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
      - name: Determine Rust components
        id: packages
        run: |
          packages=$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          packages = sorted(
              pkg["name"]
              for pkg in data["packages"]
              if pkg["name"] != "integ"
          )
          print(json.dumps(packages))
          PY
          )
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  rust-format:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: 1.93
      - name: Check Formatting
        run: cargo fmt -- --check

  build-rust:
    needs: rust-components
    name: build-rust (${{ matrix.package }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.rust-components.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build
        run: cargo build --all-features --package ${{ matrix.package }}
      - name: Run Clippy
        run: cargo clippy --all-features --all-targets --package ${{ matrix.package }} -- -D warnings
      - name: Run lib tests
        run: cargo nextest run --all-features --package ${{ matrix.package }} -E 'kind(lib)' --no-tests=pass

  integ-postgres:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build Arroyo
        run: cargo build --all-features --package arroyo
      - name: Integ postgres
        run: |
          killall arroyo || true
          mkdir -p /tmp/arroyo-integ
          ARROYO__DISABLE_TELEMETRY=true ARROYO__CHECKPOINT_URL=file:///tmp/arroyo-integ ARROYO__COMPILER__ARTIFACT_URL=file:///tmp/artifacts target/debug/arroyo cluster &
          cargo nextest run --package integ -E 'kind(test)'

  integ-sqlite:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build Arroyo
        run: cargo build --all-features --package arroyo
      - name: Integ sqlite
        run: |
          killall arroyo || true
          mkdir -p /tmp/arroyo-integ
          ARROYO__DISABLE_TELEMETRY=true ARROYO__CHECKPOINT_URL=file:///tmp/arroyo-integ ARROYO__COMPILER__ARTIFACT_URL=file:///tmp/artifacts ARROYO__DATABASE__TYPE=sqlite target/debug/arroyo cluster &
          timeout=10; while ! nc -z localhost 5115 && [ $timeout -gt 0 ]; do sleep 1; timeout=$((timeout - 1)); done; [ $timeout -gt 0 ]
          cargo nextest run --package integ -E 'kind(test)'

  build-console:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]
      - name: Build console
        run: |
          cd webui
          pnpm build
