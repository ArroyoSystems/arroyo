name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      webui: ${{ steps.filter.outputs.webui }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            webui:
              - 'webui/**'
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  lint-console:
    needs: changes
    if: needs.changes.outputs.webui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]
      - name: Run prettier
        run: |
          cd webui
          pnpm check

  rust-components:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93
      - name: Determine Rust components
        id: packages
        run: |
          packages=$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          packages = sorted(
              pkg["name"]
              for pkg in data["packages"]
              if pkg["name"] != "integ"
          )
          bundled_packages = [
              ("fast-foundation", [
                  "arroyo-metrics",
                  "arroyo-types",
                  "arroyo-udf-common",
                  "arroyo-udf-macros",
              ]),
              ("fast-runtime", [
                  "arroyo-compiler-service",
                  "arroyo-rpc",
                  "arroyo-state",
                  "arroyo-storage",
                  "arroyo-udf-host",
              ]),
          ]
          grouped = []
          assigned = set()
          for name, group_packages in bundled_packages:
              present = [pkg for pkg in group_packages if pkg in packages]
              if not present:
                  continue
              grouped.append(
                  {
                      "name": name,
                      "package_args": " ".join(f"--package {pkg}" for pkg in present),
                  }
              )
              assigned.update(present)
          grouped.extend(
              {
                  "name": pkg,
                  "package_args": f"--package {pkg}",
              }
              for pkg in packages
              if pkg not in assigned
          )
          print(json.dumps(grouped))
          PY
          )
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  rust-format:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: 1.93
      - name: Check Formatting
        run: cargo fmt -- --check

  build-rust:
    needs: rust-components
    name: build-rust (${{ matrix.package.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.rust-components.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Run Clippy
        run: cargo clippy --all-features --all-targets ${{ matrix.package.package_args }} -- -D warnings
      - name: Run lib tests
        run: cargo nextest run --all-features ${{ matrix.package.package_args }} -E 'kind(lib)' --no-tests=pass

  integ-postgres:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build Arroyo
        run: cargo build --all-features --package arroyo
      - name: Integ postgres
        run: |
          killall arroyo || true
          mkdir -p /tmp/arroyo-integ
          ARROYO__DISABLE_TELEMETRY=true ARROYO__CHECKPOINT_URL=file:///tmp/arroyo-integ ARROYO__COMPILER__ARTIFACT_URL=file:///tmp/artifacts target/debug/arroyo cluster &
          cargo nextest run --package integ -E 'kind(test)'

  integ-sqlite:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: ./.github/actions/setup-rust-ci
        env:
          DATABASE_URL: "postgres://arroyo:arroyo@localhost:5432/arroyo"
      - name: Build Arroyo
        run: cargo build --all-features --package arroyo
      - name: Integ sqlite
        run: |
          killall arroyo || true
          mkdir -p /tmp/arroyo-integ
          ARROYO__DISABLE_TELEMETRY=true ARROYO__CHECKPOINT_URL=file:///tmp/arroyo-integ ARROYO__COMPILER__ARTIFACT_URL=file:///tmp/artifacts ARROYO__DATABASE__TYPE=sqlite target/debug/arroyo cluster &
          timeout=10; while ! nc -z localhost 5115 && [ $timeout -gt 0 ]; do sleep 1; timeout=$((timeout - 1)); done; [ $timeout -gt 0 ]
          cargo nextest run --package integ -E 'kind(test)'

  build-console:
    needs: changes
    if: needs.changes.outputs.webui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]
      - name: Build console
        run: |
          cd webui
          pnpm build
